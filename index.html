<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esküvői visszaszámláló</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #fdf9fa;
      --bg2: #f8eef1;
      --overlay: rgba(255, 248, 250, 0.86);
      --card: rgba(255, 255, 255, 0.78);
      --border: rgba(214, 185, 193, 0.34);
      --text: #7a5a63;
      --muted: #b09199;
      --shadow: 0 18px 40px rgba(122, 90, 99, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Montserrat', sans-serif;
      background:
        linear-gradient(var(--overlay), var(--overlay)),
        url("https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 980px;
      background: rgba(255,255,255,0.32);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 28px;
      padding: 52px 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(80, 55, 63, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      line-height: 1.05;
      color: #7b5a63;
    }

    .subtitle {
      margin-bottom: 28px;
      font-size: 1rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .date {
      margin-bottom: 42px;
      font-size: 1.1rem;
      font-style: italic;
      color: #8f7078;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 24px;
      max-width: 920px;
      margin: 0 auto;
    }

    .box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px 16px 22px;
      box-shadow: var(--shadow);
    }

    .number {
      font-size: clamp(2.3rem, 5vw, 3.5rem);
      font-weight: 400;
      color: #7b5a63;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .number.change {
      transform: scale(1.12);
      opacity: 0.65;
    }

    .label {
      margin-top: 10px;
      font-size: 0.9rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer {
      margin-top: 42px;
      font-size: 1rem;
      color: #90727a;
    }

    @media (max-width: 820px) {
      .container {
        padding: 42px 18px;
      }

      .countdown {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        gap: 18px;
        max-width: 500px;
      }
    }

    @media (max-width: 460px) {
      body {
        padding: 14px;
      }

      .container {
        border-radius: 22px;
        padding: 34px 14px;
      }

      .subtitle {
        font-size: 0.86rem;
        letter-spacing: 0.18em;
      }

      .date {
        font-size: 1rem;
      }

      .countdown {
        gap: 14px;
      }

      .box {
        padding: 22px 10px 18px;
        border-radius: 18px;
      }

      .label {
        font-size: 0.78rem;
        letter-spacing: 0.16em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lili & Isi</h1>

    <div class="subtitle">Visszaszámlálás a nagy napig</div>

    <div class="date">2026. április 25. 14:30</div>

    <div class="countdown">
      <div class="box">
        <div id="days" class="number">0</div>
        <div class="label">nap</div>
      </div>

      <div class="box">
        <div id="hours" class="number">0</div>
        <div class="label">óra</div>
      </div>

      <div class="box">
        <div id="minutes" class="number">0</div>
        <div class="label">perc</div>
      </div>

      <div class="box">
        <div id="seconds" class="number">0</div>
        <div class="label">mp</div>
      </div>
    </div>

    <div class="footer">Szeretettel várunk erre a különleges napra</div>
  </div>

  <script>
    const weddingDate = new Date("2026-04-25T14:30:00+02:00").getTime();

    function setValue(id, value) {
      const el = document.getElementById(id);
      const currentValue = el.textContent;

      if (currentValue !== String(value)) {
        el.classList.add("change");

        setTimeout(() => {
          el.textContent = value;
          el.classList.remove("change");
        }, 120);
      }
    }

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = weddingDate - now;

      if (distance <= 0) {
        setValue("days", 0);
        setValue("hours", 0);
        setValue("minutes", 0);
        setValue("seconds", 0);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      setValue("days", days);
      setValue("hours", hours);
      setValue("minutes", minutes);
      setValue("seconds", seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
